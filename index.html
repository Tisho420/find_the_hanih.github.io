<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>מערכת איתור חניך</title>

<style>
  body {
    margin: 0;
    font-family: system-ui, -apple-system, sans-serif;
    background: black;
    color: white;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  .fullscreen-layer {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 9999;
  }

  #initScreen { background: #000; z-index: 10000; cursor: pointer; }
  .init-btn {
    padding: 15px 30px;
    background: #4da3ff;
    color: #000;
    border-radius: 25px;
    font-weight: bold;
    font-size: 16px;
  }

  #loadingScreen { background: #111; color: #ccc; display: none; }
  #progressBar { width: 70%; height: 12px; background: #333; border-radius: 6px; overflow: hidden; margin-top: 20px; }
  #progress { height: 100%; width: 0; background: #ff453a; transition: width 0.1s linear; }

  #mainInterface { background: #000; display: none; justify-content: flex-start; }
  #statusBar { width: 100%; display: flex; justify-content: space-between; padding: 10px 20px; box-sizing: border-box; font-size: 14px; }

  #alertModal {
    background: #1c1c1e;
    width: 85%;
    max-width: 320px;
    border-radius: 14px;
    text-align: center;
    margin-top: 20vh;
    box-shadow: 0 10px 30px rgba(0,0,0,0.8);
    overflow: hidden;
  }

  #content { padding: 25px 20px; }
  #title { font-size: 18px; font-weight: bold; margin-bottom: 10px; }
  #text { font-size: 14px; color: #a1a1aa; margin-bottom: 20px; }
  #coyote { width: 100%; max-width: 200px; border-radius: 8px; }

  #actions { display: flex; border-top: 1px solid #333; }
  .btn { flex: 1; padding: 16px; font-size: 16px; font-weight: 600; border: none; background: transparent; color: #4da3ff; cursor: pointer; }
  .btn:first-child { border-right: 1px solid #333; color: #ff453a; }

  @keyframes flash { 0% { background: #000; } 50% { background: #3a0000; } 100% { background: #000; } }
  .flash { animation: flash 0.8s infinite; }
</style>

<script>
let flashing = false;

function updateTime() {
  const now = new Date();
  document.getElementById("time").innerText = 
    now.getHours().toString().padStart(2,'0') + ":" + 
    now.getMinutes().toString().padStart(2,'0');
}
setInterval(updateTime, 1000);

// --- Alert Effects ---
function triggerHardwareEffects() {
  // Stop the alarm music
  document.getElementById("alarmMusic").pause();

  // 1. Vibrate
  if (navigator.vibrate) navigator.vibrate([400, 200, 400]);
  
  // 2. Play "Yay" Sound
  const yay = document.getElementById("yaySound");
  yay.play().catch(() => {});

  // 3. Start Flashing
  if (!flashing) {
    document.getElementById("mainInterface").classList.add("flash");
    flashing = true;
  }
}

function startExperience() {
  document.getElementById("initScreen").style.display = "none";
  document.getElementById("loadingScreen").style.display = "flex";
  
  // Start the Alarming Music
  const alarm = document.getElementById("alarmMusic");
  alarm.play().catch(() => {});

  if (document.documentElement.requestFullscreen) {
    document.documentElement.requestFullscreen().catch(() => {});
  }
  runLoadingBar();
}

function runLoadingBar() {
  let progress = 0;
  const bar = document.getElementById("progress");
  const interval = setInterval(() => {
    progress += Math.random() * 10;
    if (progress > 100) progress = 100;
    bar.style.width = progress + "%";
    
    if (progress >= 100) {
      clearInterval(interval);
      setTimeout(() => {
        document.getElementById("loadingScreen").style.display = "none";
        document.getElementById("mainInterface").style.display = "flex";
        updateTime();
        triggerHardwareEffects();
      }, 300);
    }
  }, 120);
}

function dismiss() {
  window.close();
  setTimeout(() => {
    window.location.href = "https://www.google.com";
  }, 150);
}

function retry() {
  triggerHardwareEffects();
}
</script>
</head>

<body>

<div id="initScreen" class="fullscreen-layer" onclick="startExperience()">
  <div class="init-btn">Start System Optimization</div>
</div>

<div id="loadingScreen" class="fullscreen-layer">
  <div style="color: #ff453a; font-weight: bold;">מחפש מיקום חניך...</div>
  <div id="progressBar"><div id="progress"></div></div>
</div>

<div id="mainInterface" class="fullscreen-layer">
  <div id="statusBar">
    <span id="time">00:00</span>
    <span>⚠️ צריך לגלות את מיקום החניך בדחיפות</span>
  </div>

  <div id="alertModal">
    <div id="content">
      <div id="title">דיווח בית</div>
      <div id="text">
        החניך אריאל הגיע הביתה בבטחה.<br>
        שיהיה סופש נעים.
      </div>
      <img id="coyote" src="https://cdn.looneytuneswiki.com/thumb/c/ca/Wile_E._Coyote.png/1200px-Wile_E._Coyote.png">
    </div>

    <div id="actions">
      <button class="btn" onclick="dismiss()">DISMISS</button>
      <button class="btn" onclick="retry()">RETRY</button>
    </div>
  </div>
</div>

<audio id="alarmMusic" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" loop></audio>
<audio id="yaySound" src="https://www.myinstants.com/media/sounds/children-yay-sound-effect.mp3"></audio>

</body>
</html>
